name: Merge custom.wav chunks
on: [workflow_dispatch]
permissions:
  contents: write
jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Merge chunks
        run: python3 merge_chunks.py
      - name: Commit result
        run: |
          git config user.name Wallbreazzz
          git config user.email 110282866+Wallbreazzz@users.noreply.github.com
          git add -A
          git commit -m "Merge custom.wav chunks into single file"
          git push
