name: Merge custom.wav chunks
on: [workflow_dispatch]
jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Merge chunks
        run: |
          python3 -c "
          import base64, glob
          chunks = []
          for f in sorted(glob.glob('custom.wav.b64.*')):
              with open(f) as fh:
                  chunks.append(fh.read().strip())
          combined = ''.join(chunks)
          with open('custom.wav', 'wb') as fh:
              fh.write(base64.b64decode(combined))
          "
          rm -f custom.wav.b64.* merge_wav.sh .github/workflows/merge.yml
      - name: Commit result
        run: |
          git config user.name Wallbreazzz
          git config user.email 110282866+Wallbreazzz@users.noreply.github.com
          git add -A
          git commit -m "Merge custom.wav chunks into single file"
          git push
